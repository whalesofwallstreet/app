name: Wow Engine CI

on:
  push:
    branches: [ main ]
    paths:
      - 'wow-engine/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'wow-engine/**'

jobs:
  test:
    name: Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wow-engine

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wow_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/wow_engine
      SQLX_OFFLINE: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wow-engine

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy Lints
        run: cargo clippy -- -D warnings

      # Verifies that the .sqlx offline cache is up to date.
      # If a developer modifies a sqlx::query! macro but forgets to run
      # `cargo sqlx prepare`, this step will fail and block the PR.
      - name: Verify SQLx offline cache is up to date
        run: |
          cargo install sqlx-cli --no-default-features --features postgres --locked
          sqlx migrate run
          cargo sqlx prepare --check
        env:
          SQLX_OFFLINE: false

      - name: Run Tests
        run: cargo test
