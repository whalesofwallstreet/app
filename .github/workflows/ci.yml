name: Wow Engine CI

on:
  push:
    branches: [ main ]
    paths:
      - 'wow-engine/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'wow-engine/**'

jobs:
  test:
    name: Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wow-engine

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wow_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/wow_engine
      SQLX_OFFLINE: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wow-engine

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy Lints
        run: cargo clippy -- -D warnings

      # Verifies that the .sqlx offline cache is up to date.
      # If a developer modifies a sqlx::query! macro but forgets to run
      # `cargo sqlx prepare`, this step will fail and block the PR.
      - name: Verify SQLx offline cache is up to date
        run: |
          cargo install sqlx-cli --no-default-features --features postgres --locked
          sqlx migrate run
          cargo sqlx prepare --check
        env:
          SQLX_OFFLINE: false

      - name: Run Tests
        run: cargo test

  benchmark:
    name: Continuous Benchmarking
    runs-on: ubuntu-24.04
    needs: test
    permissions:
      pull-requests: write
      contents: write
    defaults:
      run:
        working-directory: wow-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wow-engine

      - name: Create cache directory
        run: mkdir -p ../cache

      - name: Download previous benchmark data
        uses: actions/cache/restore@v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-benchmark-

      - name: Run Benchmarks
        run: |
          cargo bench --bench router_benchmarks -- --output-format bencher | tee benchmark_result.txt
        env:
          MOCK_GAS_ORACLE: "true"

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Whales of Wall Street Router Benchmarks
          tool: 'cargo'
          output-file-path: wow-engine/benchmark_result.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-always: true
          fail-on-alert: true
          alert-threshold: '105%'
          external-data-json-path: ./cache/benchmark-data.json

      - name: Save benchmark data
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.run_id }}
